services:
  postgres:
    image: ${POSTGRES_IMAGE:-postgres:16-alpine}
    container_name: n8n-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-n8n}
      POSTGRES_USER: ${POSTGRES_USER:-n8n}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in Portainer before deploying}
    volumes:
      - ${DATA_DIR:-/opt/stacks/n8n}/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  n8n-init:
    image: busybox:1.36
    container_name: n8n-init
    restart: "no"
    command: ["sh", "-c", "mkdir -p /data /files && chown -R 1000:1000 /data /files"]
    volumes:
      - ${DATA_DIR:-/opt/stacks/n8n}/data:/data
      - ${DATA_DIR:-/opt/stacks/n8n}/files:/files

  n8n:
    image: ${N8N_IMAGE:-docker.n8n.io/n8nio/n8n:stable}
    container_name: n8n
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      n8n-init:
        condition: service_completed_successfully
    ports:
      - "${N8N_BIND_IP:-0.0.0.0}:${N8N_PORT:-5678}:5678/tcp"
    environment:
      NODE_ENV: production
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: ${POSTGRES_DB:-n8n}
      DB_POSTGRESDB_USER: ${POSTGRES_USER:-n8n}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in Portainer before deploying}
      N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS: "true"
      N8N_PORT: 5678
      N8N_PROTOCOL: ${N8N_PROTOCOL:-http}
      N8N_HOST: ${N8N_HOST:-localhost}
      N8N_EDITOR_BASE_URL: ${N8N_EDITOR_BASE_URL:-http://localhost:5678}
      WEBHOOK_URL: ${N8N_WEBHOOK_URL:-http://localhost:5678/}
      GENERIC_TIMEZONE: ${GENERIC_TIMEZONE:-America/Chicago}
      TZ: ${GENERIC_TIMEZONE:-America/Chicago}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY:?Set N8N_ENCRYPTION_KEY in Portainer before deploying}
      N8N_SECURE_COOKIE: ${N8N_SECURE_COOKIE:-false}
      N8N_RESTRICT_FILE_ACCESS_TO: /files
      N8N_DIAGNOSTICS_ENABLED: "false"
    volumes:
      - ${DATA_DIR:-/opt/stacks/n8n}/data:/home/node/.n8n
      - ${DATA_DIR:-/opt/stacks/n8n}/files:/files
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test:
        - CMD-SHELL
        - node -e "fetch('http://127.0.0.1:5678/healthz/readiness').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
