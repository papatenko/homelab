services:
  termix:
    image: ghcr.io/lukegus/termix:latest
    container_name: termix
    restart: unless-stopped
    ports:
      - ${COMPOSE_PORT_HTTP:-8083}:8080
    volumes:
      - ${DATA_DIR:-/opt/stacks/termix}/data:/app/data
    environment:
      PORT: "8080"
      GUACD_HOST: guacd
    depends_on:
      - guacd
    networks:
      - termix-net

  guacd:
    image: guacamole/guacd:1.6.0
    container_name: termix-guacd
    restart: unless-stopped
    networks:
      - termix-net

networks:
  termix-net:
    driver: bridge
