services:
  # WireGuard client namespace for qBittorrent. qBittorrent has no independent
  # network and therefore cannot reach the internet when this tunnel is down.
  gluetun:
    image: qmcgaw/gluetun:latest
    container_name: media-gluetun
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      - VPN_SERVICE_PROVIDER=${VPN_SERVICE_PROVIDER:-custom}
      - VPN_TYPE=${VPN_TYPE:-wireguard}
      - WIREGUARD_PRIVATE_KEY=${WIREGUARD_PRIVATE_KEY:-}
      - WIREGUARD_PRESHARED_KEY=${WIREGUARD_PRESHARED_KEY:-}
      - WIREGUARD_ADDRESSES=${WIREGUARD_ADDRESSES:-}
      - WIREGUARD_PUBLIC_KEY=${WIREGUARD_PUBLIC_KEY:-}
      - WIREGUARD_ENDPOINT_IP=${WIREGUARD_ENDPOINT_IP:-}
      - WIREGUARD_ENDPOINT_PORT=${WIREGUARD_ENDPOINT_PORT:-51820}
      - WIREGUARD_PERSISTENT_KEEPALIVE=${WIREGUARD_PERSISTENT_KEEPALIVE:-25}
      - FIREWALL_INPUT_PORTS=8080,6881
      - TZ=${TZ}
    ports:
      - "8081:8080"
      - "6881:6881"
      - "6881:6881/udp"
    profiles:
      - vpn
    restart: unless-stopped

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    network_mode: service:gluetun
    depends_on:
      - gluetun
    profiles:
      - vpn
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - WEBUI_PORT=8080
    volumes:
      - ${DATA_DIR:-/mnt/misc/media}/appdata/qbittorrent:/config
      - ${MEDIA_ROOT:-/mnt/misc/media}:/data
      - ${DOWNLOAD_PATH}:/downloads
    restart: unless-stopped

  jellyfin:
    image: jellyfin/jellyfin:latest
    container_name: jellyfin
    user: "${PUID}:${PGID}"
    devices:
      - /dev/dri:/dev/dri
    group_add:
      - "${VIDEO_GID:-44}"
      - "${RENDER_GID:-104}"
    ports:
      - "8096:8096/tcp"
      - "7359:7359/udp"
    volumes:
      - ${DATA_DIR:-/mnt/misc/media}/appdata/jellyfin:/config
      - ${JELLYFIN_TRANSCODE_CACHE:-${DATA_DIR:-/mnt/misc/media}/appdata/jellyfin-cache}:/cache
      - ${MEDIA_ROOT:-/mnt/misc/media}:/data
      - ${CUSTOM_FONTS:-/usr/share/fonts/truetype}:/usr/local/share/fonts/custom:ro
    environment:
      - JELLYFIN_PublishedServerUrl=${PUBLISHED_URL}
      - TZ=${TZ}
    restart: unless-stopped

  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${DATA_DIR:-/mnt/misc/media}/appdata/sonarr:/config
      - ${MEDIA_ROOT:-/mnt/misc/media}:/data
      - ${DOWNLOAD_PATH}:/downloads
    ports:
      - "8989:8989"
    restart: unless-stopped

  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${DATA_DIR:-/mnt/misc/media}/appdata/radarr:/config
      - ${MEDIA_ROOT:-/mnt/misc/media}:/data
      - ${DOWNLOAD_PATH}:/downloads
    ports:
      - "7878:7878"
    restart: unless-stopped

  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${DATA_DIR:-/mnt/misc/media}/appdata/prowlarr:/config
    ports:
      - "9696:9696"
    restart: unless-stopped

  bazarr:
    image: lscr.io/linuxserver/bazarr:latest
    container_name: bazarr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${DATA_DIR:-/mnt/misc/media}/appdata/bazarr:/config
      - ${MEDIA_ROOT:-/mnt/misc/media}:/data
    ports:
      - "6767:6767"
    restart: unless-stopped

  jellyseerr:
    image: fallenbagel/jellyseerr:latest
    container_name: jellyseerr
    environment:
      - LOG_LEVEL=info
      - TZ=${TZ}
    volumes:
      - ${DATA_DIR:-/mnt/misc/media}/appdata/jellyseerr:/app/config
    ports:
      - "5055:5055"
    restart: unless-stopped

networks:
  default:
    name: media
    driver: bridge
