name: nextcloud-mcp

services:
  nextcloud-mcp:
    image: ghcr.io/cbcoutinho/nextcloud-mcp-server:latest
    container_name: nextcloud-mcp
    restart: always
    # Serves streamable-http at /mcp on container port 8000.
    # Bound to the host so nginxproxymanager can front it with HTTPS + auth.
    ports:
      - ${NEXTCLOUD_MCP_PORT:-8009}:8000
    environment:
      - NEXTCLOUD_HOST=${NEXTCLOUD_HOST}
      - NEXTCLOUD_USERNAME=${NEXTCLOUD_USERNAME}
      - NEXTCLOUD_PASSWORD=${NEXTCLOUD_PASSWORD}
