services:
  homepage:
    image: ghcr.io/gethomepage/homepage:latest
    container_name: homepage
    ports:
      - 3000:3000
    volumes:
      - homepage_config:/app/config
    command:
      - sh
      - -c
      - |
        set -eu
        mkdir -p /app/config
        cat > /app/config/services.yaml <<'HOMEPAGE_SERVICES_YAML'
        ---
        # Internal LAN service directory. IPs are supplied by Portainer stack variables
        # as HOMEPAGE_VAR_* values; ports stay visible here for quick reference.
        
        - Core Infrastructure:
            - Pi-hole:
                icon: pi-hole
                href: https://{{HOMEPAGE_VAR_RASPI_IP}}:8443/admin/
                siteMonitor: https://{{HOMEPAGE_VAR_RASPI_IP}}:8443/admin/
            - Nginx Proxy Manager:
                icon: nginx-proxy-manager
                href: http://{{HOMEPAGE_VAR_RASPI_IP}}:81
                siteMonitor: http://{{HOMEPAGE_VAR_RASPI_IP}}:81
            - WireGuard:
                icon: wireguard
                href: http://{{HOMEPAGE_VAR_RASPI_IP}}:51821
                siteMonitor: http://{{HOMEPAGE_VAR_RASPI_IP}}:51821
            - Authentik:
                icon: authentik
                href: http://{{HOMEPAGE_VAR_RASPI_IP}}:9000
                siteMonitor: http://{{HOMEPAGE_VAR_RASPI_IP}}:9000
            - Portainer:
                icon: portainer
                href: https://{{HOMEPAGE_VAR_PORTAINER_IP}}:9443
                siteMonitor: https://{{HOMEPAGE_VAR_PORTAINER_IP}}:9443
        
        - Storage and Media:
            - Nextcloud:
                icon: nextcloud
                href: http://{{HOMEPAGE_VAR_NAS_IP}}:11000
                siteMonitor: http://{{HOMEPAGE_VAR_NAS_IP}}:11000
            - Nextcloud Admin:
                icon: nextcloud
                href: https://{{HOMEPAGE_VAR_NAS_IP}}:8080
                siteMonitor: https://{{HOMEPAGE_VAR_NAS_IP}}:8080
            - Immich:
                icon: immich
                href: http://{{HOMEPAGE_VAR_NAS_IP}}:2283
                siteMonitor: http://{{HOMEPAGE_VAR_NAS_IP}}:2283
            - Jellyfin:
                icon: jellyfin
                href: http://{{HOMEPAGE_VAR_JELLYFIN_IP}}:8096
                siteMonitor: http://{{HOMEPAGE_VAR_JELLYFIN_IP}}:8096
            - qBittorrent:
                icon: qbittorrent
                href: http://{{HOMEPAGE_VAR_JELLYFIN_IP}}:8081
                siteMonitor: http://{{HOMEPAGE_VAR_JELLYFIN_IP}}:8081
        
        - Apps:
            - Vaultwarden:
                icon: vaultwarden
                href: http://{{HOMEPAGE_VAR_NAS_IP}}:9445
                siteMonitor: http://{{HOMEPAGE_VAR_NAS_IP}}:9445
            - Actual Budget:
                icon: actual-budget
                href: http://{{HOMEPAGE_VAR_NAS_IP}}:5006
                siteMonitor: http://{{HOMEPAGE_VAR_NAS_IP}}:5006
            - Wallos:
                icon: wallos
                href: http://{{HOMEPAGE_VAR_NAS_IP}}:8282
                siteMonitor: http://{{HOMEPAGE_VAR_NAS_IP}}:8282
            - Backrest:
                icon: http://{{HOMEPAGE_VAR_NAS_IP}}:9898/favicon.ico
                href: http://{{HOMEPAGE_VAR_NAS_IP}}:9898
                siteMonitor: http://{{HOMEPAGE_VAR_NAS_IP}}:9898
            - Open WebUI:
                icon: open-webui
                href: http://{{HOMEPAGE_VAR_OPENWEBUI_IP}}:8080
                siteMonitor: http://{{HOMEPAGE_VAR_OPENWEBUI_IP}}:8080
            - UpSnap:
                icon: http://{{HOMEPAGE_VAR_RASPI_IP}}:8090/favicon.ico
                href: http://{{HOMEPAGE_VAR_RASPI_IP}}:8090
                siteMonitor: http://{{HOMEPAGE_VAR_RASPI_IP}}:8090
        
        - Coolify Apps:
            - Coolify:
                icon: coolify
                href: http://{{HOMEPAGE_VAR_COOLIFY_IP}}:8000
                siteMonitor: http://{{HOMEPAGE_VAR_COOLIFY_IP}}:8000
            - Portfolio:
                icon: http://{{HOMEPAGE_VAR_COOLIFY_IP}}:4321/favicon.ico
                href: http://{{HOMEPAGE_VAR_COOLIFY_IP}}:4321
                siteMonitor: http://{{HOMEPAGE_VAR_COOLIFY_IP}}:4321
            - Old Portfolio:
                icon: http://{{HOMEPAGE_VAR_COOLIFY_IP}}:4000/favicon.ico
                href: http://{{HOMEPAGE_VAR_COOLIFY_IP}}:4000
                siteMonitor: http://{{HOMEPAGE_VAR_COOLIFY_IP}}:4000
            - Metro:
                icon: http://{{HOMEPAGE_VAR_COOLIFY_IP}}:4001/favicon.ico
                href: http://{{HOMEPAGE_VAR_COOLIFY_IP}}:4001
                siteMonitor: http://{{HOMEPAGE_VAR_COOLIFY_IP}}:4001
            - POS:
                icon: http://{{HOMEPAGE_VAR_COOLIFY_IP}}:3000/favicon.ico
                href: http://{{HOMEPAGE_VAR_COOLIFY_IP}}:3000
                siteMonitor: http://{{HOMEPAGE_VAR_COOLIFY_IP}}:3000
            - RPS:
                icon: http://{{HOMEPAGE_VAR_COOLIFY_IP}}:3003/favicon.ico
                href: http://{{HOMEPAGE_VAR_COOLIFY_IP}}:3003
                siteMonitor: http://{{HOMEPAGE_VAR_COOLIFY_IP}}:3003
        HOMEPAGE_SERVICES_YAML
        cat > /app/config/settings.yaml <<'HOMEPAGE_SETTINGS_YAML'
        ---
        # For configuration options and examples, please see:
        # https://gethomepage.dev/configs/settings/
        
        layout:
          Core Infrastructure:
            style: row
            columns: 5
          Storage and Media:
            style: row
            columns: 5
          Apps:
            style: row
            columns: 6
          Coolify Apps:
            style: row
            columns: 6
        
        statusStyle: dot
        
        HOMEPAGE_SETTINGS_YAML
        cat > /app/config/widgets.yaml <<'HOMEPAGE_WIDGETS_YAML'
        ---
        # Keep Homepage free of API keys/passwords. Runtime checks live on service cards
        # via siteMonitor entries in services.yaml.
        
        - datetime:
            text_size: xl
            format:
              timeStyle: short
        HOMEPAGE_WIDGETS_YAML
        cat > /app/config/docker.yaml <<'HOMEPAGE_DOCKER_YAML'
        ---
        # Docker integrations are intentionally disabled so Homepage does not need
        # docker socket access or service credentials for this internal link directory.
        HOMEPAGE_DOCKER_YAML
        cat > /app/config/kubernetes.yaml <<'HOMEPAGE_KUBERNETES_YAML'
        ---
        # sample kubernetes config
        HOMEPAGE_KUBERNETES_YAML
        cat > /app/config/bookmarks.yaml <<'HOMEPAGE_BOOKMARKS_YAML'
        ---
        # For configuration options and examples, please see:
        # https://gethomepage.dev/configs/bookmarks
        HOMEPAGE_BOOKMARKS_YAML
        cat > /app/config/proxmox.yaml <<'HOMEPAGE_PROXMOX_YAML'
        ---
        # Proxmox integration disabled for credential-free internal link dashboard.
        HOMEPAGE_PROXMOX_YAML
        cat > /app/config/custom.css <<'HOMEPAGE_CUSTOM_CSS'
        
        HOMEPAGE_CUSTOM_CSS
        cat > /app/config/custom.js <<'HOMEPAGE_CUSTOM_JS'
        
        HOMEPAGE_CUSTOM_JS
        exec node server.js
    environment:
      PUID: ${PUID:-1000}
      PGID: ${PGID:-1000}
      HOMEPAGE_ALLOWED_HOSTS: ${HOMEPAGE_ALLOWED_HOSTS}
      HOMEPAGE_VAR_RASPI_IP: ${HOMEPAGE_VAR_RASPI_IP}
      HOMEPAGE_VAR_NAS_IP: ${HOMEPAGE_VAR_NAS_IP}
      HOMEPAGE_VAR_COOLIFY_IP: ${HOMEPAGE_VAR_COOLIFY_IP}
      HOMEPAGE_VAR_PORTAINER_IP: ${HOMEPAGE_VAR_PORTAINER_IP}
      HOMEPAGE_VAR_JELLYFIN_IP: ${HOMEPAGE_VAR_JELLYFIN_IP}
      HOMEPAGE_VAR_OPENWEBUI_IP: ${HOMEPAGE_VAR_OPENWEBUI_IP}
    restart: unless-stopped

volumes:
  homepage_config:
