services:
  wallos:
    image: bellamy/wallos:latest
    container_name: wallos
    ports:
      - '8282:80/tcp'
    environment:
      - TZ=${TZ}
    volumes:
      - ${WALLOS_DATA_DIR}/db:/var/www/html/db
      - ${WALLOS_DATA_DIR}/logos:/var/www/html/images/uploads/logos
    restart: unless-stopped
