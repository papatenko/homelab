services:
  actual_server:
    image: ${ACTUAL_IMAGE:-docker.io/actualbudget/actual-server:latest}
    container_name: actual-server
    restart: unless-stopped
    ports:
      - "${ACTUAL_PORT:-5006}:5006"
    environment:
      ACTUAL_PORT: 5006
    volumes:
      - ${ACTUAL_DATA_DIR:-/opt/stacks/actual/data}:/data
    healthcheck:
      test: ["CMD-SHELL", "node scripts/health-check.js"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 20s

  actual_mcp:
    image: ${ACTUAL_MCP_IMAGE:-ghcr.io/agigante80/actual-mcp-server:latest}
    container_name: actual-mcp
    restart: unless-stopped
    depends_on:
      actual_server:
        condition: service_healthy
    ports:
      - "${ACTUAL_MCP_PORT:-3600}:3600"
    environment:
      ACTUAL_SERVER_URL: ${ACTUAL_MCP_ACTUAL_SERVER_URL:-http://actual_server:5006}
      ACTUAL_PASSWORD: ${ACTUAL_MCP_ACTUAL_PASSWORD:-}
      ACTUAL_BUDGET_SYNC_ID: ${ACTUAL_MCP_BUDGET_SYNC_ID:-}
      ACTUAL_BUDGET_PASSWORD: ${ACTUAL_MCP_BUDGET_ENCRYPTION_PASSWORD:-}
      MCP_SSE_AUTHORIZATION: ${ACTUAL_MCP_BEARER_TOKEN:-}
      MCP_BRIDGE_DATA_DIR: /app/data
    volumes:
      - ${ACTUAL_MCP_DATA_DIR:-/opt/stacks/actual-mcp/data}:/app/data
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('net').connect(3600, '127.0.0.1').on('connect', () => process.exit(0)).on('error', () => process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
